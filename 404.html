<style>
:root{
  --ink:#15110c; --ink-2:#1d1812;
  --paper:#ece3d2; --paper-dim:#b9ae98; --paper-faint:#8a8069;
  --gold:#c8a24a; --gold-text:#d9b65f;
  --oxblood:#a8392f; --oxblood-tx:#d2695d;
  --line:rgba(236,227,210,.12);
  --serif-d:'Fraunces',Georgia,'Times New Roman',serif;
  --serif-t:'Newsreader',Georgia,'Times New Roman',serif;
  --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
}
*,*::before,*::after{box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{
  margin:0; min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  background:
    radial-gradient(120% 80% at 50% -10%, #211a12 0%, rgba(33,26,18,0) 60%),

  color:var(--paper);
  font-family:var(--serif-t);
  line-height:1.7;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  padding:clamp(1.2rem,5vw,3rem);
}
::selection{background:var(--gold);color:#1a140c;}
a{color:var(--gold-text);text-decoration:none;}
a:hover{color:#ecd089;}
.card{max-width:54ch;text-align:center;}
.kicker{
  font-family:var(--mono); font-size:.74rem; letter-spacing:.22em;
  text-transform:uppercase; color:var(--oxblood-tx); margin-bottom:1.4rem;
}
.code{
  font-family:var(--serif-d); font-weight:900;
  font-size:clamp(4.5rem,18vw,8.5rem); line-height:.92;
  color:var(--gold); margin:0 0 .2rem; letter-spacing:-.02em;
  font-optical-sizing:auto;
}
h1{
  font-family:var(--serif-d); font-weight:600;
  font-size:clamp(1.3rem,4vw,1.9rem); margin:.3rem 0 1rem; color:var(--paper);
}
p{color:var(--paper-dim); margin:0 auto 1.8rem; max-width:46ch;}
.rule{width:54px;height:3px;background:var(--gold);margin:1.6rem auto;}
.home{
  display:inline-block; font-family:var(--mono); font-size:.82rem;
  letter-spacing:.04em; padding:.7rem 1.3rem;
  border:1px solid rgba(200,162,74,.45); border-radius:3px;
  color:var(--gold-text); transition:background .2s,border-color .2s;
}
.home:hover{background:rgba(200,162,74,.10);border-color:var(--gold);}
.links{margin-top:2.4rem;font-family:var(--mono);font-size:.78rem;color:var(--paper-faint);}
.links a{margin:0 .5rem;white-space:nowrap;}
